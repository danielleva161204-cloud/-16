<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FinanceFlow">
<meta name="theme-color" content="#0d1117">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FinanceFlow">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="manifest.json">
<title>💎 FinanceFlow</title>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--border:#21262d;--border2:#30363d;--text:#e6edf3;--text2:#8b949e;--text3:#656d76;--gold:#e8a87c;--green:#7ce8c0;--blue:#7cb8e8;--red:#e87c7c;--purple:#c07ce8;--r:14px;--rs:10px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:"Helvetica Neue",-apple-system,sans-serif;direction:rtl;height:100vh;display:flex;flex-direction:column;overflow:hidden}
input,textarea,button{font-family:inherit;-webkit-appearance:none;appearance:none}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input:focus,textarea:focus{outline:none;border-color:var(--gold)!important;box-shadow:0 0 0 2px rgba(232,168,124,0.2)}
button{cursor:pointer;transition:opacity 0.15s,transform 0.1s}
button:active{opacity:0.75;transform:scale(0.96)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
#hdr{background:rgba(22,27,34,0.97);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:14px 12px 90px;max-width:820px;width:100%;margin:0 auto;-webkit-overflow-scrolling:touch}
#nav{background:rgba(22,27,34,0.97);border-top:1px solid var(--border);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px)}
.nb{flex:1;background:none;border:none;color:var(--text3);padding:8px 0 6px;display:flex;flex-direction:column;align-items:center;gap:2px;min-height:48px;border-top:2px solid transparent;transition:color 0.15s,border-color 0.15s}
.nb.active{color:var(--gold);border-top-color:var(--gold)}
.nb span:first-child{font-size:18px}
.nb span:last-child{font-size:9px;font-weight:500}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.ct{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:10px}
.pt{font-size:18px;font-weight:800;margin-bottom:12px}
.row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(33,38,45,0.5)}
.row:last-child{border-bottom:none}
.kg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.kc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:transform 0.15s}
.kc:active{transform:scale(0.97)}
.kv{font-size:15px;font-weight:800}
.pb{background:var(--bg3);border-radius:6px;height:6px;overflow:hidden}
.pf{height:100%;border-radius:6px;transition:width 0.5s}
.inp{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);padding:11px 12px;font-size:15px;font-family:inherit;transition:border-color 0.15s}
.inp::placeholder{color:var(--text3)}
.lbl{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.ig{margin-bottom:12px}
textarea.inp{resize:vertical;min-height:64px}
.bp{background:var(--gold);color:#0d1117;border:none;border-radius:var(--rs);padding:11px 18px;font-weight:800;font-size:13px;font-family:inherit;min-height:42px}
.bs{background:none;color:var(--text2);border:1px solid var(--border2);border-radius:var(--rs);padding:9px 14px;font-size:12px;font-family:inherit;min-height:38px}
.bd{background:none;color:var(--red);border:1px solid rgba(232,124,124,0.3);border-radius:var(--rs);padding:9px 14px;font-size:12px}
.bi{background:none;border:none;padding:4px 6px;font-size:15px;min-height:30px;min-width:30px}
.bm{background:var(--bg3);color:var(--gold);border:1px solid var(--border);border-radius:8px;padding:4px 9px;font-size:11px;min-height:28px}
.pill{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:11px;color:var(--text2);white-space:nowrap}
.pill.on{border-color:var(--gold);color:var(--gold);background:rgba(232,168,124,0.1)}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
#mo{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:none;align-items:flex-end;justify-content:center}
#mo.show{display:flex}
#mb{background:var(--bg2);border:1px solid var(--border2);border-radius:18px 18px 0 0;padding:18px 14px 18px;width:100%;max-width:580px;max-height:88vh;overflow-y:auto;animation:su 0.28s cubic-bezier(0.34,1.3,0.64,1)}
@keyframes su{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.mt{font-size:15px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.bk{background:none;border:none;color:var(--text2);font-size:12px;padding:3px}
.ib{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);padding:9px 11px;margin-bottom:7px;font-size:11px;color:var(--text2);line-height:1.6}
.tb{background:rgba(124,232,192,0.08);border:1px solid rgba(124,232,192,0.2);border-radius:var(--rs);padding:8px 11px;margin-bottom:7px;font-size:11px;color:var(--green)}
.wb{background:rgba(232,124,124,0.08);border:1px solid rgba(232,168,124,0.2);border-radius:var(--rs);padding:8px 11px;margin-bottom:7px;font-size:11px;color:var(--gold)}
.ic{background:var(--bg2);border:1px solid var(--border);border-top:3px solid var(--gold);border-radius:var(--r);padding:13px;margin-bottom:9px}
.gc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:9px}
.gb{display:inline-block;border-radius:20px;padding:3px 8px;font-size:10px;font-weight:700;margin-top:5px}
.gb.g{background:rgba(124,232,192,0.15);color:var(--green)}
.gb.w{background:rgba(232,168,124,0.15);color:var(--gold)}
.gb.r{background:rgba(232,124,124,0.15);color:var(--red)}
.txr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(33,38,45,0.4);gap:7px}
.txr:last-child{border-bottom:none}
.tc{flex:1;background:transparent;border:2px solid var(--border2);border-radius:var(--r);padding:16px 9px;text-align:center;color:var(--text);min-height:85px}
.co{background:var(--bg);border:1px solid var(--border2);border-radius:var(--r);padding:12px 9px;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.es{text-align:center;padding:36px 16px}
.pg2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ccdel{background:var(--red);color:white;border:none;border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.ld{animation:pulse 1.2s infinite}
.cbub{max-width:82%;padding:9px 12px;border-radius:14px;font-size:12px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.cbub.u{background:#1e2a3a;border:1px solid rgba(124,184,232,0.2)}
.cbub.a{background:#121e12;border:1px solid rgba(124,232,192,0.2)}
.cs{font-size:9px;font-weight:700;margin-bottom:3px}
.cs.u{color:var(--blue)}
.cs.a{color:var(--green)}
#cm{min-height:180px;max-height:36vh;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:10px}
.cr{display:flex}
.cr.u{justify-content:flex-start}
.cr.a{justify-content:flex-end}
</style>
</head>
<body>
<div id="hdr">
  <div style="display:flex;align-items:center;gap:8px">
    <span style="font-size:20px">💎</span>
    <div>
      <div style="font-size:15px;font-weight:800;color:var(--gold)" id="hdr-name">FinanceFlow</div>
      <div style="font-size:10px;color:var(--text2)" id="hdr-sub"></div>
    </div>
  </div>
  <button class="bs" style="font-size:12px;padding:5px 10px" onclick="openHelp()">❓ עזרה</button>
</div>
<div id="content"></div>
<nav id="nav">
  <button class="nb active" onclick="gt('dash')" id="t-dash"><span>🏠</span><span>סקירה</span></button>
  <button class="nb" onclick="gt('inv')" id="t-inv"><span>📊</span><span>השקעות</span></button>
  <button class="nb" onclick="gt('tx')" id="t-tx"><span>💳</span><span>תזרים</span></button>
  <button class="nb" onclick="gt('goals')" id="t-goals"><span>🎯</span><span>יעדים</span></button>
  <button class="nb" onclick="gt('salary')" id="t-salary"><span>💰</span><span>משכורת</span></button>
  <button class="nb" onclick="gt('ai')" id="t-ai"><span>🤖</span><span>AI</span></button>
  <button class="nb" onclick="gt('settings')" id="t-settings"><span>⚙️</span><span>הגדרות</span></button>
</nav>
<div id="mo" onclick="CM(event)"><div id="mb"></div></div>
<script>
const K='ff_v6';
const BL={investments:[],goals:[],transactions:[],aiChat:[],varExpenses:[],profile:{name:'',age:'',family:'',job:'',city:'',kids:'',notes:'',photo:''},settings:{salaryDay:10,monthlySalary:'',fixedExp:[]},lastCompound:null,notifSent:{}};
function ld(){try{const r=localStorage.getItem(K);return r?JSON.parse(r):JSON.parse(JSON.stringify(BL))}catch{return JSON.parse(JSON.stringify(BL))}}
function sv(){try{localStorage.setItem(K,JSON.stringify(DB))}catch{}}
let DB=ld();
if(!DB.varExpenses)DB.varExpenses=[];
if(!DB.profile)DB.profile={name:'',age:'',family:'',job:'',city:'',kids:'',notes:'',photo:''};
if(!DB.settings.fixedExp)DB.settings.fixedExp=[];
if(!DB.bankBalance)DB.bankBalance={};
if(!DB.notifSent)DB.notifSent={};
const fmt=n=>(+(n||0)).toLocaleString('he-IL');
const fmtS=n=>(n>=0?'+':'')+fmt(n);
const nm=()=>new Date().toISOString().slice(0,7);
const td=()=>new Date().toISOString().slice(0,10);
const uid=()=>Date.now()+Math.floor(Math.random()*9999);
const MN=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const ml=ym=>{if(!ym)return'';const[y,m]=ym.split('-');return MN[parseInt(m)-1]+' '+y};
const ICATS=[
  {id:'realestate',lb:'נדל״ן',ic:'🏠',cl:'#e8a87c',flds:[{k:'dealType',l:'סוג',t:'chips',opts:['דירה למגורים','דירה להשקעה','קרקע','מסחרי','אחר']},{k:'address',l:'כתובת',t:'text',p:'תל אביב...'},{k:'purchasePrice',l:'מחיר קנייה (₪)',t:'number',p:'1200000'},{k:'currentValue',l:'שווי נוכחי (₪)',t:'number',p:'1350000'},{k:'monthlyRent',l:'שכ״ד חודשי (₪)',t:'number',opt:true},{k:'mortgage',l:'משכנתא (₪/חודש)',t:'number',opt:true},{k:'managementFee',l:'דמי ניהול (₪/חודש)',t:'number',opt:true},{k:'notes',l:'הערות',t:'textarea',opt:true}]},
  {id:'stocks',lb:'שוק ההון',ic:'📈',cl:'#7ce8c0',flds:[{k:'dealType',l:'סוג',t:'chips',opts:['S&P 500','MSCI World','Nasdaq 100','תל אביב 125','קרן כספית MMF','ETF כללי','מניות בודדות','אג״ח','אחר']},{k:'name',l:'שם / פרטים',t:'text',p:'Vanguard VOO...'},{k:'currentValue',l:'שווי תיק (₪)',t:'number',p:'85000'},{k:'monthlyDeposit',l:'הפקדה חודשית (₪)',t:'number',p:'1000',opt:true},{k:'annualReturn',l:'תשואה שנתית (%)',t:'number',p:'7',opt:true},{k:'broker',l:'ברוקר',t:'chips',opts:['IBI','מיטב דש','מור','Interactive Brokers','eToro','אחר'],opt:true},{k:'managementFeePercent',l:'דמי ניהול שנתיים (%)',t:'number',p:'0.5',opt:true},{k:'notes',l:'הערות',t:'textarea',opt:true}]},
  {id:'pension',lb:'פנסיה / השתלמות',ic:'🏦',cl:'#7cb8e8',flds:[{k:'dealType',l:'סוג',t:'chips',opts:['קרן פנסיה','קרן השתלמות','ביטוח מנהלים','קופת גמל','אחר']},{k:'company',l:'חברה',t:'chips',opts:['מגדל','הראל','מנורה מבטחים','הפניקס','מיטב','מור','כלל','אחר']},{k:'currentValue',l:'צבירה (₪)',t:'number',p:'320000'},{k:'monthlyDeposit',l:'הפקדה חודשית (₪)',t:'number',p:'1800',opt:true},{k:'annualReturn',l:'תשואה שנתית (%)',t:'number',p:'5',opt:true},{k:'managementFeePercent',l:'דמי ניהול מצבירה (%)',t:'number',p:'0.5',opt:true},{k:'notes',l:'הערות',t:'textarea',opt:true}]},
  {id:'crypto',lb:'קריפטו',ic:'₿',cl:'#f7931a',flds:[{k:'dealType',l:'סוג',t:'chips',opts:['Bitcoin','Ethereum','Altcoins','Stablecoins','DeFi','אחר']},{k:'name',l:'מטבעות / פלטפורמה',t:'text',p:'BTC, ETH...'},{k:'currentValue',l:'שווי (₪)',t:'number',p:'25000'},{k:'invested',l:'סכום שהושקע (₪)',t:'number',p:'18000',opt:true},{k:'notes',l:'הערות',t:'textarea',opt:true}]},
  {id:'business',lb:'עסק / פרילנס',ic:'💼',cl:'#c07ce8',flds:[{k:'dealType',l:'סוג',t:'chips',opts:['עסק עצמאי','שותפות','חברה בע״מ','פרילנס','אחר']},{k:'name',l:'שם העסק',t:'text',p:'ייעוץ...'},{k:'currentValue',l:'שווי (₪)',t:'number',p:'150000'},{k:'monthlyRent',l:'הכנסה חודשית (₪)',t:'number',opt:true},{k:'notes',l:'הערות',t:'textarea',opt:true}]},
  {id:'other',lb:'אחר',ic:'💰',cl:'#aaa',flds:[{k:'dealType',l:'סוג',t:'text',p:'זהב, אמנות...'},{k:'name',l:'שם',t:'text',p:'תן שם לנכס'},{k:'currentValue',l:'שווי (₪)',t:'number',p:'50000'},{k:'monthlyRent',l:'תשואה חודשית (₪)',t:'number',opt:true},{k:'notes',l:'הערות',t:'textarea',opt:true}]}
];
const ic=id=>ICATS.find(c=>c.id===id)||ICATS[5];
const FXCAT=[{id:'mortgage',lb:'🏠 משכנתא',cl:'#e8a87c'},{id:'savings',lb:'📈 חיסכון',cl:'#7ce8c0'},{id:'insurance',lb:'🛡️ ביטוח',cl:'#7cb8e8'},{id:'pension',lb:'🏦 פנסיה',cl:'#c07ce8'},{id:'rent',lb:'🏘️ שכ״ד',cl:'#f7931a'},{id:'mgmt',lb:'📱 סלולר / מנויים',cl:'#e87c7c'},{id:'other',lb:'📋 אחר',cl:'#aaa'}];
const fc=id=>FXCAT.find(c=>c.id===id)||FXCAT[6];
const INCC=['משכורת','בונוס','שכ״ד שמתקבל','דיבידנד','פרילנס','מכירת נכס','מתנה','קצבה'];
const EXPC=['מזון וסופר','תחבורה','בידור ומסעדות','בריאות','ביגוד','חינוך','חשבונות','ביטוח','ילדים','חופשות','מנויים','ספורט','אחר'];
const FS=['רווק/ה','נשוי/נשואה','גרוש/ה','אלמן/ה','ידוע/ה בציבור'];
// auto compound
(()=>{const tm=nm();if(DB.lastCompound===tm)return;DB.investments=DB.investments.map(inv=>{const dep=parseFloat(inv.monthlyDeposit)||0,ret=(parseFloat(inv.annualReturn)||0)/12/100,fee=(parseFloat(inv.managementFeePercent)||0)/12/100;if(!dep&&!ret&&!fee)return inv;return{...inv,currentValue:Math.round((inv.currentValue||0)*(1+ret-fee)+dep)}});DB.lastCompound=tm;sv()})();
let CT='dash';
function gt(t){CT=t;document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));const b=document.getElementById('t-'+t);if(b)b.classList.add('active');render()}
function getFin(){
  const tot=DB.investments.reduce((s,i)=>s+(i.currentValue||0),0);
  const totFee=DB.investments.reduce((s,i)=>s+(parseFloat(i.managementFee)||0)+((parseFloat(i.managementFeePercent)||0)/12/100*(i.currentValue||0)),0);
  const uTx=DB.transactions.filter(t=>!t.auto);
  const tm=nm(),tmTx=uTx.filter(t=>t.date&&t.date.startsWith(tm));
  const inc=tmTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=tmTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  return{tot,totFee,uTx,inc,exp,bal:inc-exp};
}
function render(){
  const p=DB.profile||{};
  const hn=document.getElementById('hdr-name');const hs=document.getElementById('hdr-sub');
  if(hn)hn.textContent=p.name?'שלום, '+p.name+' 👋':'FinanceFlow 💎';
  if(hs)hs.textContent=[p.age?'גיל '+p.age:'',p.city].filter(Boolean).join(' • ')||'';
  const c=document.getElementById('content');c.innerHTML='';
  const isNew=!p.name&&!DB.investments.length&&!DB.transactions.length;
  if(isNew&&CT==='dash'){c.appendChild(rWelcome());return}
  const fns={dash:rDash,inv:rInv,tx:rTx,goals:rGoals,salary:rSalary,ai:rAI,settings:rSettings};
  if(fns[CT])c.appendChild(fns[CT]());
}
// WELCOME
function rWelcome(){
  const d=document.createElement('div');
  d.innerHTML=`<div style="text-align:center;padding:18px 0 10px"><div style="font-size:50px;margin-bottom:8px">💎</div><h2 style="color:var(--text);margin-bottom:4px">ברוכים הבאים!</h2><p style="color:var(--text2);font-size:13px">בואו נכיר אותך</p></div>
  <div class="card"><div class="ct">👤 פרופיל אישי</div>
  <div class="ig"><label class="lbl">שם מלא *</label><input class="inp" id="p-name" placeholder="ישראל ישראלי"></div>
  <div class="pg2" style="margin-bottom:10px">
    <div class="ig" style="margin:0"><label class="lbl">גיל</label><input class="inp" type="number" id="p-age" placeholder="30"></div>
    <div class="ig" style="margin:0"><label class="lbl">כמות ילדים</label><input class="inp" type="number" id="p-kids" placeholder="0" min="0"></div>
  </div>
  <div class="ig"><label class="lbl">מצב משפחתי</label><div class="pills" id="p-fam">${FS.map(f=>`<button class="pill" onclick="selFam('${f}',this)">${f}</button>`).join('')}</div></div>
  <div class="pg2" style="margin-bottom:10px">
    <div class="ig" style="margin:0"><label class="lbl">עיסוק</label><input class="inp" id="p-job" placeholder="מהנדס, מורה..."></div>
    <div class="ig" style="margin:0"><label class="lbl">עיר</label><input class="inp" id="p-city" placeholder="תל אביב"></div>
  </div>
  <div class="ig"><label class="lbl">הערות / מטרות</label><textarea class="inp" id="p-notes" placeholder="רוצה לפרוש בגיל 55..."></textarea></div>
  <button class="bp" style="width:100%;font-size:15px;margin-top:4px" onclick="saveProfile()">בואו נתחיל! 🚀</button></div>`;
  return d;
}
let _famSel='';
function selFam(f,btn){_famSel=f;document.querySelectorAll('#p-fam .pill').forEach(b=>{b.classList.remove('on');b.style.borderColor='';b.style.color='';b.style.background=''});btn.classList.add('on')}
function saveProfile(){
  const name=(document.getElementById('p-name')||{}).value||'';
  if(!name.trim()){alert('נא להזין שם');return}
  DB.profile={...DB.profile,name:name.trim(),age:(document.getElementById('p-age')||{}).value||'',family:_famSel,job:(document.getElementById('p-job')||{}).value||'',city:(document.getElementById('p-city')||{}).value||'',kids:(document.getElementById('p-kids')||{}).value||'',notes:(document.getElementById('p-notes')||{}).value||''};
  sv();gt('dash');
}
function editProfile(){
  const p=DB.profile||{};

function handleEditPhoto(inp){
  var file=inp.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    DB.profile.photo=e.target.result;
    sv();CM();editProfile();
  };
  reader.readAsDataURL(file);
}
function saveEditProfile(){
  DB.profile={...DB.profile,name:(document.getElementById('ep-name')||{}).value||DB.profile.name,age:(document.getElementById('ep-age')||{}).value||'',family:window._epFam||'',job:(document.getElementById('ep-job')||{}).value||'',city:(document.getElementById('ep-city')||{}).value||'',kids:(document.getElementById('ep-kids')||{}).value||'',notes:(document.getElementById('ep-notes')||{}).value||''};
  sv();CM();render();
}

function setIF(f){_invF=f;gt('inv')}

function doDelInv(id){DB.investments=DB.investments.filter(i=>i.id!==id);_delId=null;sv();gt('inv')}
let _wiz={step:0,catId:null,form:{},editId:null};

function openEditInv(id){const inv=DB.investments.find(i=>i.id===id);if(!inv)return;_wiz={step:1,catId:inv.catId,form:{...inv},editId:id};renderWiz()}
function renderWiz(){
  if(_wiz.step===0){let h='<div class="mt">➕ מה תרצה להוסיף?</div><div class="cg">';ICATS.forEach(c=>{h+=`<div class="co" style="border-color:${c.cl}44" onclick="selCat('${c.id}')"><span style="font-size:24px">${c.ic}</span><span style="font-weight:700;font-size:11px">${c.lb}</span></div>`});h+='</div>';OM(h)}
  else{

    let h=`<div class="mt"><button class="bk" onclick="wizBack()">←</button><span style="font-size:18px">${cat.ic}</span><span style="color:${cat.cl}">${isE?'✏️ עריכה — ':''} ${cat.lb}</span></div>`;
    flds.forEach(f=>{const v=_wiz.form[f.k]||'';
      h+=`<div class="ig"><label class="lbl">${f.l}${f.opt?' <span style="color:var(--text3);font-size:9px">(אופציונלי)</span>':''}</label>`;
      if(f.t==='chips'){h+=`<div class="pills">`;f.opts.forEach(o=>h+=`<button class="pill ${v===o?'on':''}" onclick="wChip('${f.k}','${o.replace(/'/g,"\\'")}',false)">${o}</button>`);h+=`<button class="pill ${v&&!f.opts.includes(v)?'on':''}" onclick="wChip('${f.k}','',true)">✏️ אחר</button></div>`;if(v&&!f.opts.includes(v))h+=`<input class="inp" style="margin-top:5px" value="${v}" oninput="_wiz.form['${f.k}']=this.value">`}
      else if(f.t==='textarea')h+=`<textarea class="inp" placeholder="${f.p||''}" oninput="_wiz.form['${f.k}']=this.value">${v}</textarea>`;
      else h+=`<input class="inp" type="${f.t||'text'}" value="${v}" placeholder="${f.p||''}" oninput="_wiz.form['${f.k}']=this.value">`;
      h+='</div>';
    });
    if((_wiz.catId==='stocks'||_wiz.catId==='pension')&&_wiz.form.currentValue){
      const v=parseFloat(_wiz.form.currentValue)||0,dep=parseFloat(_wiz.form.monthlyDeposit)||0,ret=parseFloat(_wiz.form.annualReturn)||7,fee=parseFloat(_wiz.form.managementFeePercent)||0,net=(ret-fee)/12/100;

// TRANSACTIONS
let _txF='all',_txW={type:null,cat:'',custom:'',amt:'',date:'',note:'',editId:null};
let _txMonth=nm();

function allMonthsList(){
  const y=new Date().getFullYear();
  const mo=[];
  // Last 3 years + next 1
  for(let yr=y-1;yr<=y+1;yr++){
    for(let m=1;m<=12;m++){
      mo.push(yr+'-'+(m<10?'0':'')+m);
    }
  }
  return mo;
}

function rTx(){
  const d=document.createElement('div');
  const allTx=DB.transactions.filter(t=>!t.auto);

  // All transactions for selected month
  const uTx=allTx.filter(t=>t.date&&t.date.startsWith(_txMonth));
  const sorted=[...uTx].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const fil=_txF==='all'?sorted:sorted.filter(t=>t.type===_txF);
  const eBCat={};uTx.filter(t=>t.type==='expense').forEach(t=>{eBCat[t.category]=(eBCat[t.category]||0)+t.amount});
  const totE=Object.values(eBCat).reduce((s,v)=>s+v,0);
  const mInc=uTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const mExp=uTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);

  // Bank balance live
  const curBal=(DB.bankBalance||{})[_txMonth]||{amount:'',updated:''};
  const baseAmt=parseFloat(curBal.amount)||0;
  const liveBal=baseAmt>0?baseAmt+mInc-mExp:null;

  // Month selector - all 12 months of current year + prev/next
  const months=allMonthsList();
  const curYr=new Date().getFullYear();
  const curMo=nm();
  const monthsWithData=[...new Set(allTx.map(t=>t.date?t.date.slice(0,7):'').filter(Boolean))];
  const displayMonths=[...new Set([...months.filter(m=>m.startsWith(curYr)||m.startsWith(curYr-1)),...monthsWithData])].sort().reverse();

  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">

    </div>`;
  } else {
    h+=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-weight:800;font-size:14px">${ml(_txMonth)}</span>

    fil.forEach((t,i)=>{

        </div>

          <span style="font-weight:800;font-size:13px;color:${t.type==='income'?'var(--green)':'var(--red)'}">${t.type==='income'?'+':'-'}₪${fmt(t.amount)}</span>
          <button class="bi" style="color:var(--blue);font-size:12px" onclick='openEditTx(${t.id})'>✏️</button>
          <button class="bi" style="color:var(--red);font-size:12px" onclick='delTx(${t.id})'>✕</button>
        </div>
      </div>`;
    });
    h+=`</div>`;
  }
  d.innerHTML=h;return d;
}

function goNow(){_txMonth=nm();_txF='all';gt('tx');}
function navMonth(dir){
  const months=allMonthsList();
  const idx=months.indexOf(_txMonth);
  if(idx>=0&&idx+dir>=0&&idx+dir<months.length){
    _txMonth=months[idx+dir];
    _txF='all';
    gt('tx');
  }
}
function setTxF(f){_txF=f;gt('tx')}
function saveBankBal(){
  const el=document.getElementById('bank-bal-inp');
  const val=(el?el.value:'').replace(/[^0-9.]/g,'');
  if(!val)return;
  if(!DB.bankBalance)DB.bankBalance={};
  DB.bankBalance[_txMonth]={amount:val,updated:new Date().toLocaleDateString('he-IL')};
  sv();gt('tx');
}
function delTx(id){DB.transactions=DB.transactions.filter(t=>t.id!==id);sv();gt('tx')}

function openEditTx(id){const t=DB.transactions.find(x=>x.id===id);if(!t)return;_txW={type:t.type,cat:t.category,custom:'',amt:String(t.amount),date:t.date||td(),note:t.note||'',editId:id};renderTxW()}
function renderTxW(){

  else{

    cats.forEach(c=>{const ac=_txW.cat===c;h+=`<button class="pill ${ac?'on':''}" onclick="setTxCat('${c.replace(/'/g,"\\'")}') " style="${ac?'border-color:'+col+';color:white;background:rgba(124,232,192,0.12)':''}">${c}</button>`});

    if(_txW.cat==='__new__')h+=`<div class="ig"><label class="lbl">שם קטגוריה חדשה</label><input class="inp" value="${_txW.custom}" placeholder="מנויים..." oninput="_txW.custom=this.value"></div>`;
    h+=`<div class="ig"><label class="lbl">סכום (₪)</label><input class="inp" type="number" style="font-size:22px;font-weight:800" value="${_txW.amt}" placeholder="0" oninput="_txW.amt=this.value"></div>`;
    h+=`<div class="ig"><label class="lbl">תאריך</label><input class="inp" type="date" value="${_txW.date}" oninput="_txW.date=this.value"></div>`;

    h+=`<div style="display:flex;gap:6px"><button class="bp" style="flex:1" onclick="saveTx()">${isE?'💾 שמור':'✅ הוסף'}</button><button class="bs" onclick="CM()">ביטול</button></div>`;

function setTxType(t){_txW.type=t;renderTxW()}
function setTxCat(c){_txW.cat=c;renderTxW()}
function saveTx(){
  const fc=_txW.cat==='__new__'?_txW.custom:_txW.cat;if(!fc||!_txW.amt){alert('נא למלא קטגוריה וסכום');return}
  if(_txW.cat==='__new__'&&fc){const k=_txW.type==='income'?'_ci':'_ce';if(!DB[k])DB[k]=[];if(!DB[k].includes(fc))DB[k].push(fc)}
  const tx={type:_txW.type,category:fc,amount:parseFloat(_txW.amt),date:_txW.date,note:_txW.note};
  if(_txW.editId)DB.transactions=DB.transactions.map(t=>t.id===_txW.editId?{...tx,id:_txW.editId}:t);else DB.transactions.push({...tx,id:uid()});
  sv();CM();gt('tx');
}
// GOALS
let _gW={name:'',target:'',saved:'',deadline:'',editId:null};
function rGoals(){
  const d=document.createElement('div');const now=new Date();
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2 class="pt" style="margin:0">🎯 יעדים פיננסיים</h2><button class="bp" onclick="openGoalW()">➕ יעד חדש</button></div>`;
  if(!DB.goals.length)h+=`<div class="es"><div style="font-size:42px;margin-bottom:9px">🎯</div><div style="font-weight:700;margin-bottom:7px">אין יעדים עדיין</div><div style="color:var(--text2);margin-bottom:18px;font-size:13px">חופשה, רכב, דירה...</div><button class="bp" onclick="openGoalW()">➕ הגדר יעד</button></div>`;
  else DB.goals.forEach(g=>{
    const pct=g.target?Math.min(100,(g.saved||0)/g.target*100):0;const rem=g.target-(g.saved||0);const done=pct>=100;
    let mLeft=null,bC='w',bT='';
    if(g.deadline){const dd=new Date(g.deadline+'-01');mLeft=Math.round((dd-now)/(1000*60*60*24*30));const needed=g.monthly||(mLeft>0?Math.ceil(rem/mLeft):Infinity);const sal=parseFloat(DB.settings.monthlySalary)||0;const fixT=(DB.settings.fixedExp||[]).reduce((s,e)=>s+e.amount,0);const avail=sal>0?sal-fixT:null;
      if(mLeft<=0){bC='r';bT='⚠️ תאריך עבר'}else if(done){bC='g';bT='✅ הושג!'}else if(avail!==null){if(needed<=avail){bC='g';bT=`✅ בר-השגה — ₪${fmt(needed)}/חודש`}else{bC='r';bT=`⚠️ צריך ₪${fmt(needed)}/חודש`}}else bT=`💡 ₪${fmt(needed)}/חודש`;
    }else if(done){bC='g';bT='✅ הושג!'}else if(g.monthly)bT=`💡 ₪${fmt(g.monthly)}/חודש`;
    const r=20;const circ=2*Math.PI*r;const sd=circ-(pct/100)*circ;const rc=done?'#7ce8c0':pct>70?'#e8a87c':pct>40?'#f7931a':'#e87c7c';
    h+=`<div class="gc" style="border-color:${done?'rgba(124,232,192,0.3)':'var(--border)'}"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><div style="font-weight:800;font-size:15px;margin-bottom:3px">${done?'✅ ':''}${g.name}</div>${g.deadline?`<div style="color:var(--text2);font-size:11px">🗓 ${ml(g.deadline)}${mLeft!==null&&!done?` · ${mLeft} חודשים נותרו`:''}${mLeft!==null&&mLeft<=0?' · עבר':''}</div>`:''}</div><div style="display:flex;align-items:center;gap:4px"><svg width="48" height="48" style="transform:rotate(-90deg)"><circle cx="24" cy="24" r="${r}" fill="none" stroke="var(--bg3)" stroke-width="4"/><circle cx="24" cy="24" r="${r}" fill="none" stroke="${rc}" stroke-width="4" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${sd.toFixed(1)}" stroke-linecap="round"/><text x="24" y="28" text-anchor="middle" style="fill:${rc};font-size:9px;font-weight:800;transform:rotate(90deg);transform-origin:24px 24px">${pct.toFixed(0)}%</text></svg><div style="display:flex;flex-direction:column;gap:2px"><button class="bi" style="color:var(--blue);font-size:13px" onclick="openEditGoal(${g.id})">✏️</button><button class="bi" style="color:var(--red);font-size:13px" onclick="delGoal(${g.id})">🗑</button></div></div></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin:8px 0"><div><label style="font-size:9px;color:var(--text3);display:block">יעד</label><span style="font-weight:800;font-size:12px;color:var(--gold)">₪${fmt(g.target)}</span></div><div><label style="font-size:9px;color:var(--text3);display:block">נחסך</label><span style="font-weight:800;font-size:12px;color:var(--green)">₪${fmt(g.saved||0)}</span></div><div><label style="font-size:9px;color:var(--text3);display:block">נותר</label><span style="font-weight:800;font-size:12px;color:var(--text2)">₪${fmt(rem)}</span></div>${g.monthly?`<div><label style="font-size:9px;color:var(--text3);display:block">לחודש</label><span style="font-weight:800;font-size:12px;color:var(--blue)">₪${fmt(g.monthly)}</span></div>`:''}</div>
    ${bT?`<div class="gb ${bC}">${bT}</div>`:''}
    <div class="pb" style="margin-top:8px"><div class="pf" style="width:${pct}%;background:${rc}"></div></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:7px"><span style="color:var(--text2);font-size:11px">${pct.toFixed(0)}% הושג</span>${done?'<span style="color:var(--green);font-weight:800;font-size:12px">🎉 הושג!</span>':`<div style="display:flex;gap:4px;flex-wrap:wrap">${[500,1000,2000,5000].map(a=>`<button class="bm" onclick="addGS(${g.id},${a})">+₪${fmt(a)}</button>`).join('')}</div>`}</div></div>`;
  });
  d.innerHTML=h;return d;
}
function delGoal(id){DB.goals=DB.goals.filter(g=>g.id!==id);sv();gt('goals')}
function addGS(id,a){DB.goals=DB.goals.map(g=>g.id===id?{...g,saved:Math.min(g.target,(g.saved||0)+a)}:g);sv();gt('goals')}
function openGoalW(){_gW={name:'',target:'',saved:'',deadline:'',editId:null};renderGoalW()}
function openEditGoal(id){const g=DB.goals.find(x=>x.id===id);if(!g)return;_gW={name:g.name,target:String(g.target),saved:String(g.saved||0),deadline:g.deadline||'',editId:id};renderGoalW()}
function renderGoalW(){
  const isE=!!_gW.editId;const mos=_gW.deadline?Math.max(1,Math.round((new Date(_gW.deadline+'-01')-new Date())/(1000*60*60*24*30))):12;
  const mon=_gW.target?Math.ceil((parseFloat(_gW.target)-(parseFloat(_gW.saved)||0))/mos):0;
  const sal=parseFloat(DB.settings.monthlySalary)||0;const fixT=(DB.settings.fixedExp||[]).reduce((s,e)=>s+e.amount,0);const avail=sal>0?sal-fixT:null;const achiev=avail!==null?mon<=avail:null;
  let h=`<div class="mt">${isE?'✏️ עריכת יעד':'🎯 יעד חדש'}</div>`;
  if(!isE)h+=`<div class="pills">${['✈️ חופשה','🚗 רכב','🏠 דירה','🆘 קרן חירום','📚 לימודים','💍 חתונה','📱 ציוד'].map(p=>`<button class="pill ${_gW.name===p?'on':''}" onclick="setGP('${p}')">${p}</button>`).join('')}</div>`;
  h+=`<div class="ig"><label class="lbl">שם היעד</label><input class="inp" value="${_gW.name}" placeholder="מה היעד?" oninput="_gW.name=this.value;updGC()"></div>`;
  h+=`<div class="ig"><label class="lbl">כמה כסף צריך? (₪)</label><input class="inp" type="number" style="font-size:20px;font-weight:700" value="${_gW.target}" placeholder="0" oninput="_gW.target=this.value;updGC()"></div>`;
  h+=`<div class="ig"><label class="lbl">כבר חסכת? (₪)</label><input class="inp" type="number" value="${_gW.saved}" placeholder="0" oninput="_gW.saved=this.value;updGC()"></div>`;
  h+=`<div class="ig"><label class="lbl">תאריך יעד</label><input class="inp" type="month" value="${_gW.deadline}" min="${nm()}" oninput="_gW.deadline=this.value;updGC()"></div>`;
  h+=`<div id="gcalc">${_gW.target?gCalcH(mon,mos,_gW.deadline,achiev,avail):''}</div>`;
  h+=`<div style="display:flex;gap:6px"><button class="bp" style="flex:1" onclick="saveGoal()">${isE?'💾 שמור':'✅ שמור יעד'}</button><button class="bs" onclick="CM()">ביטול</button></div>`;

  h+=`</div></div><div style="display:flex;gap:6px;margin-top:8px"><input class="inp" id="ai-inp" style="flex:1;font-size:14px" placeholder="שאל שאלה..." onkeydown="if(event.key==='Enter'&&!event.shiftKey)sendAI()"><button class="bp" style="min-width:60px" onclick="sendAI()">שלח →</button></div>`;
  if(chat.length)h+=`<button class="bs" style="margin-top:6px;font-size:11px" onclick="clearAI()">🗑 נקה שיחה</button>`;
  d.innerHTML=h;setTimeout(()=>{const el=document.getElementById('cm');if(el)el.scrollTop=el.scrollHeight},50);return d;
}
function setAQ(q){const el=document.getElementById('ai-inp');if(el)el.value=q}
function clearAI(){DB.aiChat=[];sv();gt('ai')}
function esc(s){var r='';for(var i=0;i<s.length;i++){var ch=s[i];if(ch==='&')r+='&amp;';else if(ch==='<')r+='&lt;';else if(ch==='>') r+='&gt;';else if(ch.charCodeAt(0)===10||ch.charCodeAt(0)===13)r+='<br>';else r+=ch;}return r;}
function sendAI(){
  const inp=document.getElementById('ai-inp');const msg=(inp?.value||'').trim();if(!msg)return;
  if(inp)inp.value='';
  DB.aiChat=DB.aiChat||[];
  DB.aiChat.push({role:'user',content:msg});
  const reply=genAdvice(msg);
  DB.aiChat.push({role:'assistant',content:reply});
  sv();gt('ai');
}
// SETTINGS
function rSettings(){
  var p=DB.profile||{};var d=document.createElement('div');
  var h='<h2 class="pt">⚙️ הגדרות</h2>';
  // Profile card
  h+='<div class="card">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div class="ct" style="margin:0">👤 פרופיל אישי</div><button class="bs" style="font-size:11px;padding:5px 10px" onclick="editProfile()">✏️ ערוך</button></div>';
  if(p.name){
    // Avatar with upload option
    var avatarEl=p.photo
      ?('<img src="'+p.photo+'" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);cursor:pointer" onclick="triggerPhotoUpload()" title="החלף תמונה">')
      :'<div style="width:64px;height:64px;border-radius:50%;background:var(--bg3);border:2px dashed var(--gold);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:2px" onclick="triggerPhotoUpload()"><span style="font-size:22px">📷</span><span style="font-size:8px;color:var(--gold)">הוסף תמונה</span></div>';
    h+='<input type="file" id="profile-photo-input" accept="image/*" style="display:none" onchange="handleProfilePhoto(this)">';
    h+='<div style="display:flex;align-items:center;gap:14px;margin-bottom:10px">'+avatarEl+'<div style="flex:1">';
    h+='<div style="font-weight:800;font-size:17px;color:var(--text)">'+p.name+(p.age?' <span style="color:var(--text2);font-size:13px;font-weight:400">· גיל '+p.age+'</span>':'')+'</div>';
    h+='<div style="color:var(--text2);font-size:12px;margin-top:3px">'+([p.family,p.job,p.city].filter(Boolean).join(' · ')||'—')+'</div>';
    if(p.kids)h+='<div style="color:var(--text2);font-size:11px;margin-top:2px">👨‍👩‍👦 '+p.kids+' ילדים</div>';
    h+='</div></div>';
    if(p.notes)h+='<div class="ib" style="font-size:12px">🎯 <strong>מטרות:</strong> '+p.notes+'</div>';
    h+='<div style="font-size:10px;color:var(--text3);margin-top:4px;text-align:center">לחץ על התמונה/האייקון להוספת/החלפת תמונה מהגלריה</div>';
  }else{
    h+='<input type="file" id="profile-photo-input" accept="image/*" style="display:none" onchange="handleProfilePhoto(this)">';
    h+='<div style="text-align:center;padding:16px"><div style="font-size:36px;margin-bottom:8px">👤</div><div style="margin-bottom:12px;font-size:13px;color:var(--text2)">לא הוגדר פרופיל עדיין</div><button class="bp" onclick="editProfile()">➕ הוסף פרופיל</button></div>';
  }
  h+='</div>';
  // Reset card — prominent and clear
  h+='<div class="card" style="border:2px solid rgba(232,124,124,0.4);background:rgba(232,124,124,0.04)">';
  h+='<div style="color:var(--red);font-weight:800;margin-bottom:6px;font-size:14px">🗑 איפוס נתונים</div>';
  h+='<p style="color:var(--text2);font-size:12px;margin-bottom:14px">לחיצה על הכפתור תמחק <strong>את כל</strong> הנתונים — השקעות, תזרים, יעדים, פרופיל. לא ניתן לשחזר!</p>';
  h+='<div style="display:flex;gap:8px;flex-wrap:wrap">';
  h+='<button style="flex:1;background:var(--red);color:white;border:none;border-radius:10px;padding:12px;font-size:13px;font-weight:800;font-family:inherit" onclick="resetAll()">🗑 מחק הכל והתחל מחדש</button>';
  h+='<button class="bs" style="font-size:12px" onclick="exportData()">💾 גבה קודם</button>';
  h+='</div></div>';
  d.innerHTML=h;return d;
}
function triggerPhotoUpload(){
  var inp=document.getElementById('profile-photo-input');
  if(inp)inp.click();
}
function handleProfilePhoto(inp){
  var file=inp.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    DB.profile.photo=e.target.result;
    sv();gt('settings');
  };
  reader.readAsDataURL(file);
}
function resetAll(){
  if(!confirm('⚠️ האם למחוק את כל הנתונים?\n\nכל ההשקעות, תזרים, יעדים ופרופיל ימחקו לצמיתות!'))return;
  if(!confirm('אתה בטוח? לא ניתן לשחזר!'))return;
  try{localStorage.removeItem(K);}catch(e){}
  // Clear all ff_ keys too
  try{
    var toRemove=[];
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k&&(k===K||k.startsWith('ff')))toRemove.push(k);
    }
    toRemove.forEach(function(k){try{localStorage.removeItem(k);}catch(e){}});
  }catch(e){}
  // Hard reset - clear DB in memory then reload
  DB=JSON.parse(JSON.stringify(BL));
  CT='dash';
  window.location.href=window.location.pathname+'?t='+Date.now();
}
function exportData(){
  try{
    const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='FinanceFlow-backup-'+new Date().toISOString().slice(0,10)+'.json';
    a.click();URL.revokeObjectURL(url);
  }catch(e){alert('שגיאה בגיבוי: '+e.message)}
}
function openHelp(){
  var items=[
    ['🏠 סקירה','כרטיסי KPI לחיצים — לחץ לנווט לפרטים.'],
    ['📊 השקעות','הוסף נכסים. מחשבון ריבית דריבית. לחיצה כפולה 🗑 למחיקה.'],
    ['💳 תזרים','יתרת עו"ש חודשית + הכנסות/הוצאות שקרו בפועל.'],
    ['🎯 יעדים','טבעת התקדמות + בדיקת בר-השגה + לוח שנה.'],
    ['💰 משכורת','הגדרות + הוצאות קבועות (לחץ קטגוריה) + משתנות.'],
    ['🤖 AI','יועץ מקומי! עובד ללא אינטרנט, מכיר את הנתונים שלך.'],
    ['⚙️ הגדרות','פרופיל אישי + איפוס נתונים + גיבוי.']
  ];
  var body=items.map(function(x){return '<div class="ib"><strong style="color:var(--text)">'+x[0]+'</strong> — '+x[1]+'</div>';}).join('');
  OM('<div class="mt">❓ מדריך השימוש</div><div class="tb" style="margin-bottom:11px;font-size:12px">💎 FinanceFlow — ניהול פיננסי אישי חכם</div>'+body+'<button class="bp" style="width:100%;margin-top:8px" onclick="CM()">הבנתי! 👍</button>');
}
function OM(h){document.getElementById('mb').innerHTML=h;document.getElementById('mo').classList.add('show')}
function CM(e){if(!e||e.target===document.getElementById('mo')){document.getElementById('mo').classList.remove('show')}}
window.CM=CM;
render();
